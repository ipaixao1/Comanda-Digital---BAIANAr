<div class="login-page">

  <div class="login-topo">
    <div class="logo-circle">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="5.5" cy="17.5" r="3.5"/>
        <circle cx="18.5" cy="17.5" r="3.5"/>
        <path d="M15 6a1 1 0 1 0 0-2 1 1 0 0 0 0 2zm-3 11.5V14l-3-3 4-3 2 3h2"/>
      </svg>
    </div>
    <h1 class="login-titulo">Área do Motoboy</h1>
    <p class="login-subtitulo">BAIANAr Entregas</p>
  </div>

  <div class="login-card">
    <div class="campo">
      <label>Matrícula</label>
      <div class="campo-input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
        </svg>
        <input
          type="text"
          placeholder="Ex: MB001"
          [(ngModel)]="matricula"
          (keyup.enter)="fazerLogin()"
          autocomplete="off"
        />
      </div>
    </div>

    <div class="campo">
      <label>Senha</label>
      <div class="campo-input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input
          [type]="senhaVisivel ? 'text' : 'password'"
          placeholder="Digite sua senha"
          [(ngModel)]="senha"
          (keyup.enter)="fazerLogin()"
        />
        <button class="toggle-senha" (click)="senhaVisivel = !senhaVisivel">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path *ngIf="!senhaVisivel" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle *ngIf="!senhaVisivel" cx="12" cy="12" r="3"/>
            <path *ngIf="senhaVisivel" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
            <line *ngIf="senhaVisivel" x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <p class="erro" *ngIf="erro">{{ erro }}</p>

    <button class="btn-entrar" (click)="fazerLogin()" [disabled]="carregando">
      {{ carregando ? 'Entrando...' : 'Entrar' }}
    </button>
  </div>

</div>
