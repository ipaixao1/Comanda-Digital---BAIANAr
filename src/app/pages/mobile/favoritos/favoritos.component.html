<div class="favoritos-page">

  <header class="favoritos-header">
    <button class="btn-voltar" routerLink="/mobile/perfil">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="favoritos-titulo">Meus Favoritos</h1>
  </header>

  <main class="favoritos-content">

    <!-- Contador -->
    <div class="favoritos-counter" *ngIf="favoritos().length > 0">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <span>{{ favoritos().length }} prato{{ favoritos().length !== 1 ? 's' : '' }} favorito{{ favoritos().length !== 1 ? 's' : '' }}</span>
    </div>

    <!-- Vazio -->
    <div class="estado-vazio" *ngIf="favoritos().length === 0">
      <svg class="vazio-icon" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
      <p class="vazio-texto">Você ainda não tem favoritos</p>
      <button class="btn-explorar" routerLink="/mobile/cardapio">Explorar Cardápio</button>
    </div>

    <!-- Lista -->
    <div class="lista" *ngIf="favoritos().length > 0">
      <article class="produto-card" *ngFor="let produto of favoritos()">

        <!-- Imagem -->
        <div class="produto-imagem-wrapper">
          <img *ngIf="produto.imagem" [src]="produto.imagem" [alt]="produto.nome" class="produto-imagem" loading="lazy"/>
          <div *ngIf="!produto.imagem" class="produto-sem-imagem">🍽️</div>
          <button class="favorito-btn ativo" (click)="removerFavorito(produto)" aria-label="Remover favorito">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
          </button>
        </div>

        <!-- Info -->
        <div class="produto-info">
          <h3 class="produto-nome">{{ produto.nome }}</h3>
          <p class="produto-descricao">{{ produto.descricao }}</p>
          <div class="produto-rodape">
            <span class="produto-preco">{{ formatarPreco(produto.preco!) }}</span>

            <div class="quantidade-control" *ngIf="getQuantidade(produto.id) > 0; else addBtn">
              <button class="qty-btn" (click)="removerProduto(produto.id)">−</button>
              <span class="qty-valor">{{ getQuantidade(produto.id) }}</span>
              <button class="qty-btn" (click)="adicionarProduto(produto.id)">+</button>
            </div>

            <ng-template #addBtn>
              <button class="adicionar-btn" (click)="adicionarProduto(produto.id)">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Adicionar
              </button>
            </ng-template>
          </div>
        </div>

      </article>
    </div>

  </main>

</div>
