<div class="detalhe-page" *ngIf="produto() as p">

  <!-- Imagem com botões -->
  <div class="imagem-wrapper">
    <img *ngIf="p.imagem" [src]="p.imagem" [alt]="p.nome" class="produto-imagem"/>
    <div *ngIf="!p.imagem" class="sem-imagem">🍽️</div>

    <button class="btn-voltar" (click)="voltar()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <button class="btn-favorito" [class.ativo]="p.favorito" (click)="toggleFavorito()">
      <svg width="16" height="16" viewBox="0 0 24 24"
        [attr.fill]="p.favorito ? 'currentColor' : 'none'"
        stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
  </div>

  <!-- Conteúdo -->
  <div class="conteudo">

    <div class="info-card">

      <!-- Nome e avaliação -->
      <h1 class="produto-nome">{{ p.nome }}</h1>
      <div class="avaliacao-row">
        <div class="estrelas">
          <span
            *ngFor="let s of getEstrelas(); let i = index"
            class="estrela"
            [class.vazia]="i + 1 > p.avaliacao"
          >★</span>
        </div>
        <span class="avaliacao-num">{{ p.avaliacao }}</span>
      </div>

      <!-- Divisor -->
      <div class="divisor"></div>

      <!-- Preço -->
      <div class="preco-row">
        <span class="preco-label">Preço</span>
        <span class="preco-valor">{{ formatarPreco(p.preco) }}</span>
      </div>

      <!-- Divisor -->
      <div class="divisor"></div>

      <!-- Descrição -->
      <div class="secao">
        <h3 class="secao-titulo">Descrição</h3>
        <p class="secao-texto">{{ p.descricaoLonga }}</p>
      </div>

      <!-- Ingredientes -->
      <div class="secao">
        <h3 class="secao-titulo">Ingredientes</h3>
        <div class="ingredientes-lista">
          <span class="ingrediente-tag" *ngFor="let ing of p.ingredientes">{{ ing }}</span>
        </div>
      </div>

    </div>

  </div>

  <!-- Footer fixo -->
  <div class="footer">
    <div class="quantidade-area">
      <span class="quantidade-label">Quantidade</span>
      <div class="quantidade-control">
        <button class="qty-btn" (click)="remover()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <span class="qty-valor">{{ quantidade() }}</span>
        <button class="qty-btn" (click)="adicionar()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>

    <button class="adicionar-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      Adicionar • {{ formatarPreco(totalPreco()) }}
    </button>
  </div>

</div>

<!-- Produto não encontrado -->
<div class="nao-encontrado" *ngIf="!produto()">
  <p>Produto não encontrado</p>
  <button (click)="voltar()">Voltar</button>
</div>
