<!-- HEADER -->
<header class="kds-header">

  <!-- Dropdown -->
  <div class="dropdown-wrapper">
    <button class="dropdown-btn" (click)="toggleDropdown()">
      <span class="status-dot" [style.backgroundColor]="unavailableCount > 0 ? '#F28705' : '#10B981'"></span>
      <span class="dropdown-label">Controle de Estoque</span>
      <svg *ngIf="!isDropdownOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="#FAFAFA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
      <svg *ngIf="isDropdownOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="#FAFAFA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

    <!-- Painel flutuante -->
    <div class="dropdown-panel" *ngIf="isDropdownOpen">

      <!-- ── ESTOQUE POR CATEGORIA ── -->
      <div class="panel-section" style="border-bottom: 1px solid rgba(255,255,255,0.1)">
        <h3 class="section-title" style="color:#F29F05">ESTOQUE POR CATEGORIA</h3>
        <div class="category-list">
          <div *ngFor="let cat of stockCategories">

            <button class="category-btn" (click)="toggleStockCategory(cat.id)">
              <div class="cat-btn-left">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                  fill="none" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="chevron-icon"
                  [class.rotated]="expandedStockCategories.has(cat.id)">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
                <span class="category-name">{{ cat.name }}</span>
              </div>
              <span *ngIf="stockCategoryUnavailableCount(cat) > 0" class="falta-count">
                {{ stockCategoryUnavailableCount(cat) }} em falta
              </span>
            </button>

            <!-- Itens do estoque — abre para baixo -->
            <div class="items-list" [class.items-expanded]="expandedStockCategories.has(cat.id)">
              <div *ngFor="let item of cat.items"
                class="stock-item-row"
                [class.item-unavailable]="item.status === 'em_falta'">

                <span class="item-name"
                  [class.name-unavailable]="item.status === 'em_falta'">
                  {{ item.name }}
                </span>

                <!-- Toggle switch — verde quando disponível, cinza quando em falta -->
                <label class="toggle-switch" (click)="$event.stopPropagation()">
                  <input type="checkbox"
                    [checked]="item.status !== 'em_falta'"
                    (change)="toggleStockItem(cat.id, item.id)" />
                  <span class="toggle-slider"></span>
                </label>

              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- ── CARDÁPIO COMPLETO ── -->
      <div class="panel-section">
        <h3 class="section-title" style="color:#F28705">CARDÁPIO COMPLETO</h3>
        <div class="category-list">
          <div *ngFor="let cat of dishCategories">

            <button class="category-btn" (click)="toggleDishCategory(cat.id)">
              <div class="cat-btn-left">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                  fill="none" stroke="#FAFAFA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="chevron-icon"
                  [class.rotated]="expandedDishCategories.has(cat.id)">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
                <span class="category-name">{{ cat.name }}</span>
              </div>
              <div *ngIf="categoryHasWarnings(cat)" class="glass-badge">
                <svg xmlns="http://www.w3.org/2000/svg" width="8" height="8" viewBox="0 0 24 24"
                  fill="none" stroke="#F28705" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                  <line x1="12" y1="9" x2="12" y2="13"></line>
                  <line x1="12" y1="17" x2="12.01" y2="17"></line>
                </svg>
                <span class="glass-badge-text">Ingredientes em falta</span>
              </div>
            </button>

            <!-- Pratos — abre para baixo -->
            <div class="items-list" [class.items-expanded]="expandedDishCategories.has(cat.id)">
              <div *ngFor="let dish of cat.dishes"
                class="stock-item-row"
                [class.item-unavailable]="getDishStatus(dish) !== 'available'"
                [class.item-warning]="getDishStatus(dish) === 'warning'">

                <div class="dish-name-wrap">
                  <svg *ngIf="getDishStatus(dish) === 'warning'"
                    xmlns="http://www.w3.org/2000/svg" width="11" height="11"
                    viewBox="0 0 24 24" fill="none" stroke="#F59E0B"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                    style="flex-shrink:0">
                    <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                    <line x1="12" y1="9" x2="12" y2="13"></line>
                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                  </svg>
                  <span class="item-name"
                    [class.name-unavailable]="getDishStatus(dish) === 'unavailable'"
                    [class.name-warning]="getDishStatus(dish) === 'warning'">
                    {{ dish.name }}
                  </span>
                </div>

                <!-- Toggle switch — verde quando disponível -->
                <label class="toggle-switch" (click)="$event.stopPropagation()">
                  <input type="checkbox"
                    [checked]="!dish.manuallyUnavailable"
                    (change)="toggleDish(cat.id, dish.id)" />
                  <span class="toggle-slider"></span>
                </label>

              </div>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Logo -->
  <div class="logo-wrapper">
    <img src="assets/images/logoBAIANAr.png" alt="BAIANAr Logo" class="logo-img" (click)="goToLogin()" />
  </div>

  <!-- Relógio -->
  <div class="clock-wrapper">
    <div class="clock-time">{{ currentTime }}</div>
    <div class="clock-date">{{ currentDate }}</div>
  </div>

</header>

<!-- Linha dourada -->
<div class="header-divider"></div>

<!-- KANBAN -->
<main class="kanban-container">
  <div class="kanban-grid">

    <div *ngFor="let col of columns" class="kanban-col">

      <div class="col-header" [style.backgroundColor]="getStatusColor(col.status)">
        <span class="col-title">{{ col.label }}</span>
        <div class="col-bar"></div>
      </div>

      <div class="cards-list">

        <div *ngIf="getOrdersByStatus(col.status).length === 0" class="empty-state">
          <div class="empty-icon-outer" [style.backgroundColor]="getStatusColor(col.status)">
            <div class="empty-icon-inner" [style.backgroundColor]="getStatusColor(col.status)"></div>
          </div>
          <p class="empty-text">Nenhum pedido</p>
        </div>

        <div *ngFor="let order of getOrdersByStatus(col.status)" class="order-card">

          <div class="card-header" [style.borderBottomColor]="getStatusColor(order.status)">
            <div class="order-number">#{{ order.id }}</div>
            <div class="card-meta">
              <span class="order-time">{{ order.time }}</span>
              <span class="meta-dot" [style.backgroundColor]="getStatusColor(order.status)"></span>
              <span class="elapsed-time">{{ getElapsedTime(order) }}</span>
            </div>
          </div>

          <div class="items-container">
            <div *ngFor="let item of order.items" class="order-item">
              <div class="item-row">
                <span class="qty-badge" [style.backgroundColor]="getStatusColor(order.status)">
                  {{ item.quantity }}x
                </span>
                <div class="item-info">
                  <div class="item-row-name">
                    <span class="item-dish-name">{{ item.name }}</span>
                    <div *ngIf="item.missingIngredient" class="missing-badge">
                      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
                        fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                        <line x1="12" y1="9" x2="12" y2="13"></line>
                        <line x1="12" y1="17" x2="12.01" y2="17"></line>
                      </svg>
                      <span class="missing-badge-text">INGREDIENTE EM FALTA</span>
                    </div>
                  </div>
                  <p *ngIf="item.observation" class="item-obs">Obs: {{ item.observation }}</p>
                </div>
              </div>
            </div>
          </div>

          <button *ngIf="order.status !== 'out_for_delivery'" class="action-btn"
            [style.backgroundColor]="getStatusColor(order.status)"
            (click)="advanceOrder(order)">
            {{ getButtonLabel(order.status) }}
          </button>

        </div>
      </div>

    </div>
  </div>
</main>
